<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MySkyByte</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--c1:#0077b6;--c2:#00b4d8;--g:#06d6a0;--mu:#7a95b0;--bd:#dde8f5;--bg:#f0f7ff;--wh:#fff}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:#1a2a3a;padding-bottom:80px}
  .bar{background:linear-gradient(135deg,var(--c1),var(--c2));padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .bt{color:#fff;font-size:17px;font-weight:800}
  .bs{color:rgba(255,255,255,.6);font-size:9px;display:block}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:blink 1.8s infinite}
  .hero{margin:14px;background:linear-gradient(135deg,#023e8a,var(--c1));border-radius:18px;padding:18px;color:#fff}
  .pbg{font-size:60px;font-weight:800;line-height:1}
  .card{margin:0 14px 12px;background:var(--wh);border-radius:16px;padding:16px;border:1px solid var(--bd);box-shadow:0 2px 12px rgba(0,100,200,.08)}
  .ov, .loading-ov{display:none;position:fixed;inset:0;background:rgba(0,10,30,.92);z-index:999;align-items:center;justify-content:center;flex-direction:column;color:#fff}
  .ov.open, .loading-ov.open{display:flex}
  .box{background:#fff;border-radius:24px;padding:24px;width:90%;max-width:360px;color:#333}
  input, select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid var(--bd);font-family:inherit;font-weight:700}
  .btn{width:100%;background:var(--c1);color:#fff;border:none;padding:14px;border-radius:10px;font-weight:800;cursor:pointer;margin-top:10px}
  .fab{position:fixed;bottom:20px;right:16px;background:#25d366;color:#fff;padding:12px 20px;border-radius:30px;text-decoration:none;font-weight:800;box-shadow:0 4px 10px rgba(0,0,0,0.2)}
  @keyframes blink{50%{opacity:0.3}}
</style>
</head>
<body>

<div class="loading-ov" id="loading">Memproses...</div>

<div class="bar" onclick="cekAdmin()">
  <div class="bt">SkyByte Network<span class="bs" id="userDisplay">Silakan Login...</span></div>
  <div class="dot"></div>
</div>

<div class="hero">
  <div style="font-size:10px; opacity:0.6">PING REALTIME</div>
  <div style="display:flex;align-items:flex-end;gap:5px"><div class="pbg" id="pn">--</div><div style="margin-bottom:10px">ms</div></div>
  <div id="statusTxt" style="font-size:12px; background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:10px; display:inline-block">Scanning...</div>
</div>

<div class="card">
  <h3 style="font-size:14px; margin-bottom:10px; color:var(--c1)">PAKET AKTIF</h3>
  <div style="border:2px solid var(--c2); padding:12px; border-radius:10px; margin-bottom:10px">
    <div style="font-weight:800">Cek Masa Aktif & Bayar</div>
    <div style="font-size:12px; color:var(--mu)">Gunakan menu di bawah untuk laporan</div>
  </div>
  <button class="btn" onclick="document.getElementById('qmod').classList.add('open')">BAYAR PAKET</button>
</div>

<div class="ov open" id="loginOv">
  <div class="box">
    <h2 style="text-align:center; color:var(--c1); margin-bottom:15px">Login User</h2>
    <input type="tel" id="lPhone" placeholder="Nomor HP (8xx...)">
    <input type="text" id="lUser" placeholder="Username">
    <button class="btn" onclick="serverCall('login')">MASUK KE DASHBOARD</button>
  </div>
</div>

<div class="ov" id="qmod">
  <div class="box">
    <h3 style="text-align:center">Pembayaran QRIS</h3>
    <img src="https://drive.google.com/thumbnail?id=1ahx0Ee-OXrALBUXX6tXpSBFwsm7yf_-X&sz=w400" style="width:100%; margin:10px 0; border-radius:10px">
    <select id="selPaket">
      <option value="Paket 50Rb">Paket 50Rb (Rp50.000)</option>
      <option value="Paket 100Rb">Paket 100Rb (Rp100.000)</option>
    </select>
    <button class="btn" style="background:var(--g)" onclick="serverCall('sendPayment')">KONFIRMASI PEMBAYARAN</button>
    <button class="btn" style="background:var(--mu); margin-top:8px" onclick="this.parentElement.parentElement.classList.remove('open')">BATAL</button>
  </div>
</div>

<div class="ov" id="adminOv">
  <div class="box" style="max-height:80vh; overflow-y:auto">
    <h3 style="color:red; text-align:center; margin-bottom:10px">ANTREAN KONFIRMASI</h3>
    <div id="listAntrean" style="font-size:12px; margin:15px 0">Memuat data...</div>
    <button class="btn" onclick="this.parentElement.parentElement.classList.remove('open')">TUTUP PANEL</button>
  </div>
</div>

<a href="https://wa.me/6282295750165" class="fab">Chat Admin</a>

<script>
// URL Web App Akang (Update jika deploy ulang)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXUBccpk_N3lUwBxVESZqUIoK014c65SCwJOogY9X_UyNcK4TMvB2x-Rrq22R5r0YP_w/exec";

var user = null;
var clicks = 0;

function showLoad(s) { document.getElementById('loading').classList.toggle('open', s); }

async function serverCall(act, extraData = {}) {
  showLoad(true);
  let payload = { action: act, ...extraData };
  
  if(act === 'login') {
    payload.phone = document.getElementById('lPhone').value.trim();
    payload.username = document.getElementById('lUser').value.trim();
  } else if(act === 'sendPayment') {
    payload.username = user.username;
    payload.paket = document.getElementById('selPaket').value;
  }

  try {
    let res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    let data = await res.json();
    showLoad(false);

    if(act === 'login') {
      if(data.found) {
        user = data.user;
        document.getElementById('loginOv').classList.remove('open');
        document.getElementById('userDisplay').innerText = "Halo, " + user.name;
      } else { alert("Data tidak cocok!"); }
    } else if(act === 'sendPayment') {
      alert(data.msg);
      document.getElementById('qmod').classList.remove('open');
    } else if(act === 'getPending') {
      renderAdmin(data);
    } else if(act === 'updateStatus') {
      alert(data.msg);
      serverCall('getPending');
    }
  } catch(e) { showLoad(false); alert("Gagal koneksi ke server!"); }
}

function cekAdmin() {
  clicks++;
  if(clicks >= 5) {
    document.getElementById('adminOv').classList.add('open');
    serverCall('getPending');
    clicks = 0;
  }
}

function renderAdmin(data) {
  let h = data.length ? "" : "<p style='text-align:center'>Semua lunas!</p>";
  data.forEach(i => {
    h += `<div style="border:1px solid #ddd; padding:12px; margin-bottom:10px; border-radius:12px; background:#f9f9f9">
      <div style="font-weight:800; color:#0077b6">@${i.user}</div>
      <div style="font-size:11px">${i.paket} (Rp${i.harga.toLocaleString()})</div>
      <button onclick="serverCall('updateStatus', {row:${i.row}, status:'Sukses'})" style="background:#06d6a0; color:white; border:none; padding:8px; border-radius:6px; margin-top:8px; width:100%; font-weight:800; cursor:pointer">TERIMA UANG</button>
    </div>`;
  });
  document.getElementById('listAntrean').innerHTML = h;
}

// Simple Ping
setInterval(() => {
  let s = performance.now();
  let img = new Image();
  img.src = "https://www.google.com/images/phd/px.gif?t=" + s;
  img.onload = img.onerror = () => {
    let m = Math.round(performance.now() - s);
    document.getElementById('pn').innerText = m;
    document.getElementById('statusTxt').innerText = m < 150 ? "KENCENG!" : "LAG";
  };
}, 3000);
</script>
</body>
</html>
